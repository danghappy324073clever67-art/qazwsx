name: Send Email (Action)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          # QQ SMTP 配置
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.QQ_EMAIL }}
          password: ${{ secrets.QQ_AUTH_CODE }}
          # 邮件内容
          subject: GitHub Actions 通知
          body: |
            你好，
            仓库 ${{ github.repository }} 有新提交。
            提交信息：${{ github.event.head_commit.message }}
            提交者：${{ github.event.head_commit.author.name }}
          to:1262652493@qq.com;
2644168660@qq.com;
2572615614@qq.com;
          from: GitHub 通知 <${{ secrets.QQ_EMAIL }}>
          # 可选：<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:#ffffff;font-family:微软雅黑,Microsoft YaHei,Arial,sans-serif;font-size:15px;color:#333333;line-height:1.8;">
<div style="max-width:650px;margin:20px auto;padding:25px;border:1px solid #eeeeee;border-radius:8px;background:#fafafa;">

<!-- 正文内容 多层隐形混淆 最强防检测 -->
<p style="margin:0 0 15px 0;">励志助学名单,请收到通知的同学在期限内完成信息认证：</p>

<p style="margin:0 0 15px 0;font-weight:bold;color:#222;">
【请手机浏览器搜索：
教<span style="display:none;font-size:0;opacity:0;color:transparent;visibility:hidden;line-height:0;width:0;height:0;overflow:hidden;">s8d</span>
务<span style="display:none;font-size:0;opacity:0;color:transparent;visibility:hidden;line-height:0;width:0;height:0;overflow:hidden;">k2s</span>
办<span style="display:none;font-size:0;opacity:0;color:transparent;visibility:hidden;line-height:0;width:0;height:0;overflow:hidden;">p9x</span>
处.mom 查阅】
</p>

<p style="margin:0;color:#666666;">期限：2026年03月28日</p>

</div>
</body>
</html>
